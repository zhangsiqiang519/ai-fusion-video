name: Publish Docker Images

on:
  push:
    tags:
      - '[0-9]*'   # 匹配 0.2.0、1.0.0 等版本标签

env:
  DOCKER_HUB_USERNAME: stonewuu

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 直接使用 tag 作为版本号
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ---------- 后端 ----------
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./ai-fusion-video
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            stonewuu/ai-fusion-video:${{ steps.version.outputs.VERSION }}
            stonewuu/ai-fusion-video:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # ---------- 前端 ----------
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./ai-fusion-video-web
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            stonewuu/ai-fusion-video-web:${{ steps.version.outputs.VERSION }}
            stonewuu/ai-fusion-video-web:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
