spring:
  # MySQL
  datasource:
    url: jdbc:mysql://localhost:43306/ai_fusion_video?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Redis
  data:
    redis:
      host: localhost
      port: 46379
      password: 123456
      database: 0

  # Spring AI - DashScope
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY:sk-placeholder}

# 日志级别（本地开发调高）
logging:
  level:
    com.stonewu.fusion: DEBUG
    org.springframework.ai: DEBUG
    # 需要关闭 SQL 日志时打开下面这行
    com.stonewu.fusion.mapper: INFO
